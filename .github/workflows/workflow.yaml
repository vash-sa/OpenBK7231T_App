name: Build ESP32 4M

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  APP_NAME: ${{ github.event.repository.name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ⚡ включаем Node.js 24

jobs:
  refs:
    name: Prepare CI Environment
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.refs.outputs.version }}
      new_release: ${{ steps.refs.outputs.new_release }}
    steps:
      - name: Source checkout
        uses: actions/checkout@v4

      - name: Semantic Release
        id: semantic
        if: github.ref == 'refs/heads/main' || github.ref_name == 'alpha'
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          semantic_version: 21
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set outputs
        id: refs
        run: |
          BRANCH=${GITHUB_REF#refs/*/}
          BRANCHTRANSLATED=$(echo ${BRANCH} | tr '/' '_')
          VERSION=""
          if ${{ steps.semantic.outputs.new_release_published == 'true' }}; then
            VERSION=${{ steps.semantic.outputs.new_release_version }}
          else
            VERSION=${BRANCHTRANSLATED}_$(git rev-parse --short=12 HEAD)
          fi
          echo "new_release=${{ steps.semantic.outputs.new_release_published }}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  build_idf:
    name: Build ESP32 4M Firmware
    needs: refs
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - platform: OpenESP32C2
            variant: 4M
            version: v5.5.2
            sdk: esp-idf
          - platform: OpenESP32C3
            variant: 4M
            version: v5.5.2
            sdk: esp-idf
          - platform: OpenESP32
            variant: 4M
            version: v5.5.2
            sdk: esp-idf
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout ESP-IDF
        uses: actions/checkout@v4
        with:
          repository: espressif/esp-idf
          path: sdk/esp-idf
          ref: ${{ matrix.version }}
          submodules: recursive

      - uses: actions/setup-python@v5
        id: pysetup
        with:
          python-version: '3.10'
          architecture: 'x64'
          cache: 'pip'

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake
          version: 1.0

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: ${{ matrix.sdk }}_toolchain_${{ matrix.version }}_${{ steps.pysetup.outputs.python-version }}

      - name: Install toolchain if cache miss
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd sdk/${{ matrix.sdk }}
          ./install.sh

      - name: Set ESP-IDF environment and build
        run: |
          cd sdk/${{ matrix.sdk }}
          . ./export.sh
          cd ../..
          make APP_VERSION=${{ needs.refs.outputs.version }} APP_NAME=${{ matrix.platform }} VARIANT="${{ matrix.variant }}" ${{ matrix.platform }}

      - name: Copy build artifacts to output
        run: |
          mkdir -p output/${{ needs.refs.outputs.version }}
          # Копируем все .bin и .img из папки сборки в output
          cp sdk/${{ matrix.sdk }}/build/*.bin output/${{ needs.refs.outputs.version }}/ || true
          cp sdk/${{ matrix.sdk }}/build/*.img output/${{ needs.refs.outputs.version }}/ || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ needs.refs.outputs.version }}_${{ matrix.platform }}_${{ matrix.variant }}
          path: |
            output/${{ needs.refs.outputs.version }}/*.bin
            output/${{ needs.refs.outputs.version }}/*.img
          if-no-files-found: warn
