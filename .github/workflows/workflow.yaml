name: Build App
on:
  push:
    branches:
      - '**'
  pull_request:
    branches: 
      - '**'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  APP_NAME: ${{ github.event.repository.name }}

jobs:
  refs:
    name: Prepare CI Environment
    runs-on: ubuntu-22.04
    outputs:
      sha_short: ${{ steps.refs.outputs.sha_short }}
      short_ref: ${{ steps.refs.outputs.short_ref }}
      version: ${{ steps.refs.outputs.version }}
    steps:
      - name: Source checkout
        uses: actions/checkout@v4
      - name: Set outputs
        id: refs
        run: |
          export BRANCH=${GITHUB_REF#refs/*/}
          export BRANCHTRANSLATED=$(echo ${BRANCH} | tr '/' '_')
          echo "short_ref=${BRANCHTRANSLATED}" >> $GITHUB_OUTPUT
          echo "sha_short=SHA-$(git rev-parse --short=12 HEAD)" >> $GITHUB_OUTPUT
          echo "version=${BRANCHTRANSLATED}_$(git rev-parse --short=12 HEAD)" >> $GITHUB_OUTPUT

  build:
    name: Build BL602
    needs: refs
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: OpenBL602
            variant: default
          - platform: OpenBL602
            variant: berry

    steps:
      - name: Source checkout
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git submodule update --init --recursive

      - name: Install Toolchain and Compression Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi ninja-build python3-pip xz-utils
          pip3 install --user serial

      - name: Build BL602
        run: |
          # Скрипт build.py сам определит платформу и создаст сжатый OTA если инструменты установлены
          python3 .github/scripts/build.py ${{ matrix.platform }} ${{ matrix.variant }}

      - name: Upload OTA Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}_${{ matrix.variant }}_OTA_${{ needs.refs.outputs.version }}
          path: |
            output/*.bin
            output/*.ota
            output/*.xz
            output/*.bin.ota
