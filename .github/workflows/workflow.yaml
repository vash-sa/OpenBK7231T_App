build_idf:
  name: Build IDF (OpenESP32C3 4M)
  needs: refs
  runs-on: ubuntu-24.04

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Checkout ESP-IDF
      uses: actions/checkout@v4
      with:
        repository: espressif/esp-idf
        path: sdk/esp-idf
        ref: v5.5.2
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x64'
        cache: 'pip'

    - name: Install dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: cmake
        version: 1.0

    - name: Cache ESP-IDF toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: ~/.espressif
        key: esp-idf_toolchain_v5.5.2_python3.10

    - name: Install toolchain (if cache miss)
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        cd sdk/esp-idf
        ./install.sh

    - name: Set ESP-IDF environment
      run: |
        cd sdk/esp-idf
        . ./export.sh
        . ./add_path.sh
        cd ../..

    - name: Build firmware
      run: |
        make APP_VERSION=${{ needs.refs.outputs.version }} \
             APP_NAME=OpenESP32C3 \
             VARIANT="4M" \
             OpenESP32C3

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}_${{ needs.refs.outputs.version }}_OpenESP32C3_4M
        path: |
          output/${{ needs.refs.outputs.version }}/OpenESP32C3_4M_*.bin
          output/${{ needs.refs.outputs.version }}/OpenESP32C3_4M_*.img
        if-no-files-found: warn
